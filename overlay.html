<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --t1-color: #3399FF; --t2-color: #FF3333; }
        body { margin: 0; background: transparent; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        #scoreboard {
            width: 900px; background: rgba(0,0,0,0.9); border-radius: 15px;
            padding: 20px 30px; margin: 50px auto; border-bottom: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .court { font-size: 28px; text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        
        .team-row { display: flex; align-items: center; height: 90px; margin: 10px 0; }

        /* ÁREA DE NOMBRE FLEXIBLE */
        .name-area { 
            flex: 1; font-size: 28px; font-weight: bold; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            padding-right: 20px; 
        }

        /* CONTENEDOR DE SETS */
        .sets-container { display: flex; gap: 10px; margin-right: 20px; }
        .set-box { 
            width: 55px; height: 75px; background: #1a1a1a; border: 2px solid #333;
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 26px;
        }

        /* CAJA DE PUNTAJE PRINCIPAL */
        .points-wrapper { position: relative; display: flex; align-items: center; }
        
        .points-box {
            width: 110px; height: 90px; border-radius: 10px; overflow: hidden;
            display: flex; justify-content: center; align-items: center; font-size: 50px;
            position: relative;
        }

        /* PUNTO DE SAQUE A LA DERECHA */
        .server-dot { 
            width: 18px; height: 18px; border-radius: 50%; background: white; 
            margin-left: 15px; opacity: 0; transition: opacity 0.3s;
            box-shadow: 0 0 15px white;
        }
        .is-serving { opacity: 1; }

        /* ANIMACIÓN DE DESLIZAMIENTO */
        .score-anim-container {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.4s ease-in-out;
            display: flex; flex-direction: column; align-items: center;
        }

        .t1-bg { background-color: var(--t1-color); }
        .t2-bg { background-color: var(--t2-color); }
    </style>
</head>
<body>

<div id="scoreboard">
    <div class="header"><p id="court" class="court">CIUDAD PADEL</p></div>

    <div class="team-row">
        <div id="name1" class="name-area">...</div>
        <div class="sets-container">
            <div id="t1s1" class="set-box">0</div>
            <div id="t1s2" class="set-box">0</div>
            <div id="t1s3" class="set-box">0</div>
        </div>
        <div class="points-wrapper">
            <div class="points-box t1-bg">
                <div id="wrapper1" class="score-anim-container"><div id="p1">0</div></div>
            </div>
            <div id="dot1" class="server-dot"></div>
        </div>
    </div>

    <div class="team-row">
        <div id="name2" class="name-area">...</div>
        <div class="sets-container">
            <div id="t2s1" class="set-box">0</div>
            <div id="t2s2" class="set-box">0</div>
            <div id="t2s3" class="set-box">0</div>
        </div>
        <div class="points-wrapper">
            <div class="points-box t2-bg">
                <div id="wrapper2" class="score-anim-container"><div id="p2">0</div></div>
            </div>
            <div id="dot2" class="server-dot"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBVcHIyjlfCHLKYU2HNj2rmmPNpmghQrXc",
        authDomain: "marcador-deportivo-8f567.firebaseapp.com",
        databaseURL: "https://marcador-deportivo-8f567-default-rtdb.firebaseio.com/",
        projectId: "marcador-deportivo-8f567",
        storageBucket: "marcador-deportivo-8f567.firebasestorage.app",
        messagingSenderId: "803031766591",
        appId: "1:803031766591:web:3767df3dcd00c752f78a8a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('matchState');

    let lastP1 = "0", lastP2 = "0";

    db.on('value', snap => {
        const d = snap.val();
        if(!d) return;

        // Actualizar Colores
        document.documentElement.style.setProperty('--t1-color', d.colorTeam1);
        document.documentElement.style.setProperty('--t2-color', d.colorTeam2);
        
        // Nombres
        document.getElementById('name1').innerText = d.team1.names;
        document.getElementById('name2').innerText = d.team2.names;
        
        // Saque (Indicador a la derecha)
        document.getElementById('dot1').classList.toggle('is-serving', d.server == 1);
        document.getElementById('dot2').classList.toggle('is-serving', d.server == 2);

        // Animación de puntos
        if(lastP1 !== d.team1.pointsText) {
            runAnim('wrapper1', 'p1', d.team1.pointsText);
            lastP1 = d.team1.pointsText;
        }
        if(lastP2 !== d.team2.pointsText) {
            runAnim('wrapper2', 'p2', d.team2.pointsText);
            lastP2 = d.team2.pointsText;
        }

        // Juegos de cada Set
        for(let i=1; i<=3; i++) {
            document.getElementById(`t1s${i}`).innerText = d.team1.games[i-1];
            document.getElementById(`t2s${i}`).innerText = d.team2.games[i-1];
        }
    });

    function runAnim(wrapId, scoreId, newVal) {
        const w = document.getElementById(wrapId);
        const s = document.getElementById(scoreId);
        // Deslizar hacia arriba el viejo
        w.style.transform = "translateY(-100%)";
        setTimeout(() => {
            w.style.transition = "none";
            w.style.transform = "translateY(100%)"; // Aparecer por abajo
            s.innerText = newVal;
            setTimeout(() => {
                w.style.transition = "transform 0.4s ease-in-out";
                w.style.transform = "translateY(0)"; // Subir a la posición central
            }, 50);
        }, 400);
    }
</script>
</body>
</html>
