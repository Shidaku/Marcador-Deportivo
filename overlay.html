<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --t1-color: #3399FF; --t2-color: #FF3333; --border-color: #ffffff; }
        body { margin: 0; background: transparent; color: white; font-family: 'Orbitron', sans-serif; }
        
        #scoreboard {
            width: 1050px; background: rgba(0,0,0,0.92); border-radius: 20px;
            padding: 20px 30px; margin: 40px auto;
            border-top: 6px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .court { font-size: 28px; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .match-title { font-size: 14px; color: #aaa; margin: 5px 0 0 0; }

        .team-row { display: flex; align-items: center; height: 80px; margin: 15px 0; }

        /* CONTENEDOR DE JUGADORES INDIVIDUALES */
        .players-container { display: flex; gap: 10px; flex: 1; }
        .player-card {
            background: rgba(255,255,255,0.05);
            padding: 10px 15px; border-radius: 8px; border-left: 4px solid white;
            font-size: 20px; min-width: 180px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .t1-border { border-left-color: var(--t1-color); }
        .t2-border { border-left-color: var(--t2-color); }

        .sets-info { display: flex; align-items: center; gap: 15px; margin-left: 20px; }
        .sets-won { font-size: 24px; color: #ffd700; font-weight: bold; width: 30px; }

        .sets-grid { display: flex; gap: 8px; }
        .set-box { 
            width: 45px; height: 60px; background: #111; border: 1px solid #333;
            border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px;
        }

        .points-area { position: relative; display: flex; align-items: center; margin-left: 20px; }
        .points-box {
            width: 95px; height: 80px; border-radius: 12px; overflow: hidden;
            display: flex; justify-content: center; align-items: center; font-size: 42px;
            position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .server-dot { 
            width: 16px; height: 16px; border-radius: 50%; background: white; 
            margin-left: 15px; opacity: 0; transition: 0.3s; box-shadow: 0 0 15px white;
        }
        .is-serving { opacity: 1; }

        .score-anim { position: absolute; width: 100%; transition: transform 0.4s ease; display: flex; flex-direction: column; align-items: center; }
        .t1-bg { background-color: var(--t1-color); }
        .t2-bg { background-color: var(--t2-color); }
    </style>
</head>
<body>

<div id="scoreboard">
    <div class="header">
        <p id="court" class="court">NOMBRE CANCHA</p>
        <p id="match" class="match-title">TÍTULO DEL PARTIDO</p>
    </div>

    <div class="team-row">
        <div class="players-container">
            <div id="p1t1" class="player-card t1-border">...</div>
            <div id="p2t1" class="player-card t1-border">...</div>
        </div>
        <div class="sets-info">
            <div id="sets1" class="sets-won">0</div>
            <div class="sets-grid">
                <div id="t1s1" class="set-box">0</div>
                <div id="t1s2" class="set-box">0</div>
                <div id="t1s3" class="set-box">0</div>
            </div>
        </div>
        <div class="points-area">
            <div class="points-box t1-bg"><div id="w1" class="score-anim"><div id="p1">0</div></div></div>
            <div id="dot1" class="server-dot"></div>
        </div>
    </div>

    <div class="team-row">
        <div class="players-container">
            <div id="p1t2" class="player-card t2-border">...</div>
            <div id="p2t2" class="player-card t2-border">...</div>
        </div>
        <div class="sets-info">
            <div id="sets2" class="sets-won">0</div>
            <div class="sets-grid">
                <div id="t2s1" class="set-box">0</div>
                <div id="t2s2" class="set-box">0</div>
                <div id="t2s3" class="set-box">0</div>
            </div>
        </div>
        <div class="points-area">
            <div class="points-box t2-bg"><div id="w2" class="score-anim"><div id="p2">0</div></div></div>
            <div id="dot2" class="server-dot"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBVcHIyjlfCHLKYU2HNj2rmmPNpmghQrXc",
        authDomain: "marcador-deportivo-8f567.firebaseapp.com",
        databaseURL: "https://marcador-deportivo-8f567-default-rtdb.firebaseio.com/",
        projectId: "marcador-deportivo-8f567",
        storageBucket: "marcador-deportivo-8f567.firebasestorage.app",
        messagingSenderId: "803031766591",
        appId: "1:803031766591:web:3767df3dcd00c752f78a8a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('matchState');

    let lastP1 = "0", lastP2 = "0";

    db.on('value', snap => {
        const d = snap.val();
        if(!d) return;

        document.documentElement.style.setProperty('--t1-color', d.colorTeam1);
        document.documentElement.style.setProperty('--t2-color', d.colorTeam2);
        document.documentElement.style.setProperty('--border-color', d.colorBorder || "#ffffff");
        
        document.getElementById('court').innerText = d.courtName;
        document.getElementById('match').innerText = d.matchTitle;
        
        document.getElementById('p1t1').innerText = d.team1.p1;
        document.getElementById('p2t1').innerText = d.team1.p2;
        document.getElementById('p1t2').innerText = d.team2.p1;
        document.getElementById('p2t2').innerText = d.team2.p2;

        document.getElementById('sets1').innerText = d.team1.sets;
        document.getElementById('sets2').innerText = d.team2.sets;
        
        document.getElementById('dot1').classList.toggle('is-serving', d.server == 1);
        document.getElementById('dot2').classList.toggle('is-serving', d.server == 2);

        if(lastP1 !== d.team1.pointsText) { runAnim('w1', 'p1', d.team1.pointsText); lastP1 = d.team1.pointsText; }
        if(lastP2 !== d.team2.pointsText) { runAnim('w2', 'p2', d.team2.pointsText); lastP2 = d.team2.pointsText; }

        for(let i=1; i<=3; i++) {
            document.getElementById(`t1s${i}`).innerText = d.team1.games[i-1];
            document.getElementById(`t2s${i}`).innerText = d.team2.games[i-1];
        }
    });

    function runAnim(wrapId, scoreId, newVal) {
        const w = document.getElementById(wrapId);
        w.style.transform = "translateY(-100%)";
        setTimeout(() => {
            w.style.transition = "none";
            w.style.transform = "translateY(100%)";
            document.getElementById(scoreId).innerText = newVal;
            setTimeout(() => {
                w.style.transition = "transform 0.4s ease";
                w.style.transform = "translateY(0)";
            }, 50);
        }, 400);
    }
</script>
</body>
</html>
