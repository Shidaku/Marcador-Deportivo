<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --t1-color: #3399FF; --t2-color: #FF3333; --header-bg: #000000; --inner-bg: #1a1a1a; }
        body { margin: 0; background: transparent; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #scoreboard { width: 650px; background: var(--inner-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

        .header { background: var(--header-bg); padding: 8px; text-align: center; border-bottom: 1px solid #333; }
        .court { font-size: 1.5rem; text-transform: uppercase; margin: 0; }
        .match { font-family: 'Roboto', sans-serif; font-size: 0.75rem; color: #aaa; margin: 0; text-transform: uppercase; }

        .content { padding: 10px 15px; }
        .team-row { display: flex; align-items: center; height: 65px; margin: 5px 0; justify-content: space-between; }

        .players { display: flex; gap: 6px; flex: 1; }
        .player-card { background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 5px; border-left: 3px solid white; font-family: 'Roboto', sans-serif; font-size: 0.9rem; font-weight: 700; min-width: 130px; }
        .t1-border { border-left-color: var(--t1-color); }
        .t2-border { border-left-color: var(--t2-color); }

        .sets-info { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
        .sets-won { font-size: 1.6rem; color: #ffd700; font-weight: bold; width: 25px; text-align: center; }
        .set-box { width: 32px; height: 45px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; }

        .points-area { position: relative; display: flex; align-items: center; margin-left: 15px; }
        .points-box { width: 75px; height: 65px; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; position: relative; }
        .server-dot { width: 12px; height: 12px; border-radius: 50%; background: white; margin-left: 8px; opacity: 0; transition: 0.3s; box-shadow: 0 0 10px white; }
        .is-serving { opacity: 1; }

        .anim { position: absolute; width: 100%; transition: transform 0.4s ease; display: flex; flex-direction: column; align-items: center; }
        .t1-bg { background-color: var(--t1-color); }
        .t2-bg { background-color: var(--t2-color); }
    </style>
</head>
<body>
    <div id="scoreboard">
        <div class="header">
            <p id="disp-court" class="court">CARGANDO...</p>
            <p id="disp-match" class="match">...</p>
        </div>
        <div class="content">
            <div class="team-row">
                <div class="players">
                    <div id="p1t1" class="player-card t1-border">...</div>
                    <div id="p2t1" class="player-card t1-border">...</div>
                </div>
                <div class="sets-info">
                    <div id="s1" class="sets-won">0</div>
                    <div id="t1s1" class="set-box">0</div>
                    <div id="t1s2" class="set-box">0</div>
                    <div id="t1s3" class="set-box">0</div>
                </div>
                <div class="points-area">
                    <div class="points-box t1-bg"><div id="w1" class="anim"><div id="pt1">0</div></div></div>
                    <div id="dot1" class="server-dot"></div>
                </div>
            </div>
            <div class="team-row">
                <div class="players">
                    <div id="p1t2" class="player-card t2-border">...</div>
                    <div id="p2t2" class="player-card t2-border">...</div>
                </div>
                <div class="sets-info">
                    <div id="s2" class="sets-won">0</div>
                    <div id="t2s1" class="set-box">0</div>
                    <div id="t2s2" class="set-box">0</div>
                    <div id="t2s3" class="set-box">0</div>
                </div>
                <div class="points-area">
                    <div class="points-box t2-bg"><div id="w2" class="anim"><div id="pt2">0</div></div></div>
                    <div id="dot2" class="server-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVcHIyjlfCHLKYU2HNj2rmmPNpmghQrXc",
            authDomain: "marcador-deportivo-8f567.firebaseapp.com",
            databaseURL: "https://marcador-deportivo-8f567-default-rtdb.firebaseio.com/",
            projectId: "marcador-deportivo-8f567",
            storageBucket: "marcador-deportivo-8f567.firebasestorage.app",
            messagingSenderId: "803031766591",
            appId: "1:803031766591:web:3767df3dcd00c752f78a8a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('matchState');
        let lp1 = "0", lp2 = "0";

        db.on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.documentElement.style.setProperty('--header-bg', d.colorHeaderBg);
            document.documentElement.style.setProperty('--inner-bg', d.colorInnerBg);
            document.documentElement.style.setProperty('--t1-color', d.colorTeam1);
            document.documentElement.style.setProperty('--t2-color', d.colorTeam2);
            document.getElementById('disp-court').innerText = d.courtName;
            document.getElementById('disp-match').innerText = d.matchTitle;
            document.getElementById('p1t1').innerText = d.team1.p1; document.getElementById('p2t1').innerText = d.team1.p2;
            document.getElementById('p1t2').innerText = d.team2.p1; document.getElementById('p2t2').innerText = d.team2.p2;
            document.getElementById('s1').innerText = d.team1.sets; document.getElementById('s2').innerText = d.team2.sets;
            document.getElementById('dot1').className = d.server==1?"server-dot is-serving":"server-dot";
            document.getElementById('dot2').className = d.server==2?"server-dot is-serving":"server-dot";
            if(lp1!==d.team1.pointsText){ anim('w1','pt1',d.team1.pointsText); lp1=d.team1.pointsText; }
            if(lp2!==d.team2.pointsText){ anim('w2','pt2',d.team2.pointsText); lp2=d.team2.pointsText; }
            for(let i=1;i<=3;i++){ document.getElementById(`t1s${i}`).innerText=d.team1.games[i-1]; document.getElementById(`t2s${i}`).innerText=d.team2.games[i-1]; }
        });

        function anim(id,sid,v){
            const w=document.getElementById(id); w.style.transform="translateY(-100%)";
            setTimeout(()=>{ w.style.transition="none"; w.style.transform="translateY(100%)"; document.getElementById(sid).innerText=v;
                setTimeout(()=>{ w.style.transition="transform 0.4s ease"; w.style.transform="translateY(0)"; },50);
            },400);
        }
    </script>
</body>
</html>
