<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Overlay PRO - Pádel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS PROFESIONALES Y ANIMACIONES --- */
        :root {
            --t1-color: #3399FF;
            --t2-color: #FF3333;
            --font-main: 'Montserrat', sans-serif; /* Fuente por defecto */
        }

        body {
            margin: 0; padding: 0; background: transparent; /* Fondo transparente para OBS */
            font-family: var(--font-main); color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #scoreboard-container {
            width: 1000px; background: rgba(0, 0, 0, 0.85); border-radius: 15px;
            padding: 20px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 5px solid white; /* Borde inferior dinámico */
        }

        .header { text-align: center; border-bottom: 1px solid #444; margin-bottom: 20px; padding-bottom: 10px; }
        .court-name { font-size: 3rem; text-transform: uppercase; margin: 0; }
        .match-title { font-size: 1.2rem; color: #aaa; margin: 0; font-weight: 300; }

        .team-row { display: flex; align-items: center; justify-content: space-between; height: 100px; margin: 15px 0; position: relative; }
        
        /* EL PUNTO DE SAQUE PROFESIONAL */
        .server-dot {
            width: 15px; height: 15px; border-radius: 50%; background-color: transparent;
            position: absolute; left: -25px; transition: background-color 0.3s, box-shadow 0.3s;
        }
        .is-serving { background-color: white; box-shadow: 0 0 15px white; }

        .team-names { font-size: 2.2rem; font-weight: 700; width: 550px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score-boxes { display: flex; align-items: center; gap: 15px; }
        
        .set-box { 
            width: 60px; height: 80px; background: #222; border: 2px solid #444; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 2rem;
        }

        /* --- LA ANIMACIÓN DE PUNTAJE DESLIZANTE --- */
        .points-box {
            width: 120px; height: 100px; border-radius: 12px; margin-left: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 4.5rem; font-weight: 700;
            overflow: hidden; /* Crucial para la animación */
            position: relative;
        }

        .score-display-wrapper {
            display: flex; flex-direction: column; width: 100%; height: 100%;
            position: absolute; left: 0;
            transition: transform 0.4s ease-in-out; /* Velocidad de la animación */
        }

        .score-value {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }

        /* Colores dinámicos */
        .points-box.t1-bg { background-color: var(--t1-color); }
        .points-box.t2-bg { background-color: var(--t2-color); }

    </style>
</head>
<body>

    <div id="scoreboard-container">
        <div class="header">
            <div id="disp-court-name" class="court-name">CIUDAD PADEL</div>
            <div id="disp-match-title" class="match-title">5TA MASCULINO - FINAL</div>
        </div>

        <div class="team-row">
            <div id="dot1" class="server-dot"></div>
            <div id="disp-t1-names" class="team-names">JUGADOR 1 / JUGADOR 2</div>
            <div class="score-boxes">
                <div id="t1-s1" class="set-box">0</div>
                <div id="t1-s2" class="set-box">0</div>
                <div id="t1-s3" class="set-box">0</div>
                <div class="points-box t1-bg">
                    <div id="t1-score-wrapper" class="score-display-wrapper">
                        <div id="t1-old-score" class="score-value">0</div>
                        <div id="t1-new-score" class="score-value">15</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="team-row">
            <div id="dot2" class="server-dot"></div>
            <div id="disp-t2-names" class="team-names">JUGADOR 3 / JUGADOR 4</div>
            <div class="score-boxes">
                <div id="t2-s1" class="set-box">0</div>
                <div id="t2-s2" class="set-box">0</div>
                <div id="t2-s3" class="set-box">0</div>
                <div class="points-box t2-bg">
                    <div id="t2-score-wrapper" class="score-display-wrapper">
                        <div id="t2-old-score" class="score-value">0</div>
                        <div id="t2-new-score" class="score-value">15</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // --- CONFIGURACIÓN DE FIREBASE (PEGA TUS DATOS AQUÍ) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVcHIyjlfCHLKYU2HNj2rmmPNpmghQrXc",
            authDomain: "marcador-deportivo-8f567.firebaseapp.com",
            databaseURL: "https://marcador-deportivo-8f567-default-rtdb.firebaseio.com/",
            projectId: "marcador-deportivo-8f567",
            storageBucket: "marcador-deportivo-8f567.firebasestorage.app",
            messagingSenderId: "803031766591",
            appId: "1:803031766591:web:3767df3dcd00c752f78a8a",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('matchState');

        // Variables para rastrear el puntaje anterior y evitar animaciones en falso
        let currentScoreT1 = "0";
        let currentScoreT2 = "0";

        // Escuchar cambios en tiempo real
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // --- 1. PERSONALIZACIÓN FULL ---
            // Fuente
            document.documentElement.style.setProperty('--font-main', data.fontFamily);
            // Colores
            document.documentElement.style.setProperty('--t1-color', data.colorTeam1);
            document.documentElement.style.setProperty('--t2-color', data.colorTeam2);
            document.getElementById('scoreboard-container').style.borderColor = data.colorTeam2; // Borde dinámico

            // Textos básicos
            document.getElementById('disp-court-name').innerText = data.courtName;
            document.getElementById('disp-match-title').innerText = data.matchTitle;
            document.getElementById('disp-t1-names').innerText = data.team1.names;
            document.getElementById('disp-t2-names').innerText = data.team2.names;

            // --- 2. EL PUNTO DE SAQUE ---
            // Se actualiza según quién saca
            document.getElementById('dot1').className = data.server === 1 ? 'server-dot is-serving' : 'server-dot';
            document.getElementById('dot2').className = data.server === 2 ? 'server-dot is-serving' : 'server-dot';

            // --- 3. JUEGOS DE LOS SETS ---
            for(let i=0; i<3; i++) {
                document.getElementById(`t1-s${i+1}`).innerText = data.team1.games[i];
                document.getElementById(`t2-s${i+1}`).innerText = data.team2.games[i];
            }

            // --- 4. LA ANIMACIÓN DE PUNTAJE ---
            animateScoreChange(1, data.team1.pointsText);
            animateScoreChange(2, data.team2.pointsText);
        });

        // Función para ejecutar la animación de puntaje deslizante
        function animateScoreChange(teamId, newScore) {
            let currentScoreVar = teamId === 1 ? currentScoreT1 : currentScoreT2;
            let setScoreVar = teamId === 1 ? (s => currentScoreT1 = s) : (s => currentScoreT2 = s);

            const wrapper = document.getElementById(`t${teamId}-score-wrapper`);
            const oldScoreEl = document.getElementById(`t${teamId}-old-score`);
            const newScoreEl = document.getElementById(`t${teamId}-new-score`);

            // Si el puntaje no ha cambiado, no hacer nada
            if (newScore === currentScoreVar) return;

            // Si es un reseteo o un salto grande (ej: ganar un set), no animar
            if (newScore === "0" || currentScoreVar === "J" || currentScoreVar === "A") {
                oldScoreEl.innerText = newScore;
                setScoreVar(newScore);
                return;
            }

            // --- EJECUTAR ANIMACIÓN ---
            // 1. Preparar valores
            oldScoreEl.innerText = currentScoreVar; // El puntaje viejo arriba
            newScoreEl.innerText = newScore;       // El puntaje nuevo abajo
            wrapper.style.transition = 'none';    // Apagar animación para posicionar
            wrapper.style.transform = 'translateY(0)'; // Volver a la posición inicial (arriba)

            // 2. Forzar un "layout" del navegador para aplicar el cambio sin animación
            wrapper.offsetHeight; 

            // 3. Encender la animación y deslizar hacia arriba
            wrapper.style.transition = 'transform 0.4s ease-in-out'; 
            wrapper.style.transform = 'translateY(-100%)'; // Mover hacia arriba para mostrar el nuevo

            // 4. Actualizar la variable de puntaje actual
            setScoreVar(newScore);
        }

    </script>
</body>
</html>
