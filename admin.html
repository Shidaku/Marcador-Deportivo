<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Control PRO - Pádel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CORRECCIÓN DE MÁRGENES Y DISEÑO MÓVIL --- */
        * { box-sizing: border-box; } /* Crucial para los márgenes */
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 10px; /* Pequeño padding general */
            color: #333;
            overflow-x: hidden; /* Evita scroll horizontal accidental */
        }

        .container { 
            max-width: 600px; /* Limita el ancho en pantallas grandes */
            margin: 0 auto; 
            width: 100%;
        }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 15px; }

        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            margin-bottom: 15px; 
        }

        .card-header { font-weight: bold; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 12px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; color: #666; }
        
        input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* Evita zoom automático en iPhone */
        }

        .color-pickers { display: flex; gap: 10px; }
        .color-pickers div { flex: 1; }
        input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; border-radius: 8px; }

        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            transition: opacity 0.2s; 
        }
        .btn:active { opacity: 0.7; }

        .btn-green { background-color: #2ecc71; }
        .btn-blue { background-color: #3399FF; }
        .btn-red { background-color: #FF3333; }
        .btn-gray { background-color: #95a5a6; }
        .btn-reset { background-color: #e74c3c; margin-top: 20px; }

        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Marcador Padel Sports 96.7</h1>

        <div class="card">
            <div class="card-header">Datos del Marcador</div>
            <div class="input-group">
                <label>Nombre de la Cancha</label>
                <input type="text" id="courtName" placeholder="Ej: CIUDAD PADEL CENTRAL">
            </div>
            <div class="input-group">
                <label>Título del Partido</label>
                <input type="text" id="matchTitle" placeholder="Ej: FINAL - 5TA MASCULINO">
            </div>
            <div class="color-pickers input-group">
                <div><label>Color Equipo 1</label><input type="color" id="colorTeam1"></div>
                <div><label>Color Equipo 2</label><input type="color" id="colorTeam2"></div>
            </div>
            <div class="input-group">
                <label>Fuente del Marcador</label>
                <select id="fontFamily">
                    <option value="'Montserrat', sans-serif">Montserrat (Moderna)</option>
                    <option value="'Orbitron', sans-serif">Orbitron (Digital)</option>
                    <option value="'Roboto Condensed', sans-serif">Roboto Condensed (Deportiva)</option>
                </select>
            </div>
            <button class="btn btn-green" onclick="saveSettings()">Guardar Estilos y Nombres</button>
        </div>

        <div class="card">
            <div class="card-header">Control de Puntos</div>
            <div class="score-grid">
                <button class="btn btn-blue" onclick="scorePoint(1)">+ Punto T1</button>
                <button class="btn btn-red" onclick="scorePoint(2)">+ Punto T2</button>
            </div>
            <div class="score-grid">
                <button class="btn btn-gray" onclick="endGame(1)">Gana Juego T1</button>
                <button class="btn btn-gray" onclick="endGame(2)">Gana Juego T2</button>
            </div>
            <div class="score-grid">
                <button class="btn btn-blue" onclick="changeServer(1)">Saque T1</button>
                <button class="btn btn-red" onclick="changeServer(2)">Saque T2</button>
            </div>
            <button class="btn btn-reset" onclick="resetMatch()">RESETEAR PARTIDO COMPLETO</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // --- CONFIGURACIÓN DE FIREBASE (PEGA TUS DATOS AQUÍ) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVcHIyjlfCHLKYU2HNj2rmmPNpmghQrXc",
            authDomain: "marcador-deportivo-8f567.firebaseapp.com",
            databaseURL: "https://marcador-deportivo-8f567-default-rtdb.firebaseio.com/", // Copia tu URL completa de Realtime Database aquí
            projectId: "marcador-deportivo-8f567",
            storageBucket: "marcador-deportivo-8f567.firebasestorage.app",
            messagingSenderId: "803031766591",
            appId: "1:803031766591:web:3767df3dcd00c752f78a8a",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('matchState');

        // Cargar datos iniciales en los inputs
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            document.getElementById('courtName').value = data.courtName;
            document.getElementById('matchTitle').value = data.matchTitle;
            document.getElementById('colorTeam1').value = data.colorTeam1;
            document.getElementById('colorTeam2').value = data.colorTeam2;
            document.getElementById('fontFamily').value = data.fontFamily;
        });

        // Guardar personalización
        function saveSettings() {
            db.update({
                courtName: document.getElementById('courtName').value,
                matchTitle: document.getElementById('matchTitle').value,
                colorTeam1: document.getElementById('colorTeam1').value,
                colorTeam2: document.getElementById('colorTeam2').value,
                fontFamily: document.getElementById('fontFamily').value
            });
            alert("Personalización guardada");
        }

        function changeServer(t) { db.update({ server: t }); }

        // Aquí van tus funciones scorePoint, endGame y resetMatch de antes. 
        // Asegúrate de copiarlas del código anterior y pegarlas aquí.
    </script>
</body>
</html>
